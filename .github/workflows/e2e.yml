name: Web E2E

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-e2e:
    name: Chromium (dev and production)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Restore Bun and CCIP model caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.cache/huggingface/hub/models--deepghs--ccip_onnx
          key: web-e2e-${{ runner.os }}-${{ hashFiles('bun.lock', 'apps/server/package.json') }}
          restore-keys: |
            web-e2e-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: apps/server/node_modules/.bin/playwright install --with-deps chromium

      - name: Run isolated web E2E suite
        run: bun run --cwd apps/server test:e2e

      - name: Upload E2E artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-artifacts
          if-no-files-found: ignore
          path: |
            apps/server/test-results
            apps/server/playwright-report
            /tmp/solid-imager-e2e
