<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xtracter Settings</title>
    <style>
        body {
            width: 300px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        h2 {
            margin-top: 0;
            font-size: 16px;
            color: #333;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #666;
        }
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: white;
        }
        button {
            width: 100%;
            padding: 8px;
            background-color: #1d9bf0;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #status {
            margin-top: 8px;
            font-size: 12px;
            text-align: center;
            min-height: 1.2em;
        }
        .error { color: #d93025; }
        .success { color: #188038; }
    </style>
</head>
<body>
    <h2>Settings</h2>
    <div class="form-group">
        <label for="api-url">API URL</label>
        <input type="text" id="api-url" placeholder="http://localhost:3000/api/rpc" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
    </div>
    <div class="form-group">
        <label for="source-select">Target Media Source</label>
        <select id="source-select" disabled>
            <option value="">Loading sources...</option>
        </select>
    </div>
    <button id="save-btn" disabled>Save</button>
    <div id="status"></div>

    <hr style="margin: 16px 0; border: 0; border-top: 1px solid #eee;">
    
    <button id="export-btn" style="background-color: #0f1419;">Export Collected JSON</button>
    <div id="export-status"></div>
    <script type="module" src="./index.ts"></script>
</body>
</html>
