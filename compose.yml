services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - ./db-data:/var/lib/postgresql/data
    ports:
      - ${DB_PORT}:5432

  app:
    image: oven/bun:1.1-alpine
    container_name: solid-imager-app
    restart: always
    working_dir: /app
    environment:
      DB_HOST: db              # 通常の Compose ネットワークのサービス名で解決するため db に変更
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      NITRO_HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - .:/app                 # プロジェクト全体をマウント（ホストでビルド済みの node_modules や成果物を使用）
    command: ["bun", "run", "start"]
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: solid-imager-nginx
    restart: always
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp" # HTTP/3 (QUIC) 用
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # rootless podman でのマウント。ホストの ~/.config/letsencrypt をマウントする。
      - ${HOME}/.config/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
