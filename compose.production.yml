services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: solid-imager-app:latest
    container_name: solid-imager-app
    restart: always
    working_dir: /app
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      NITRO_HOST: 0.0.0.0
      PORT: 3000
      CONFIG_PATH: /app/data/config.json
    volumes:
      - app-config:/app/data
      - app-cache:/app/.cache
    command: ["bun", "run", "start"]
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: solid-imager-nginx
    restart: always
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ${HOME}/.config/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app

volumes:
  app-config:
  app-cache:
